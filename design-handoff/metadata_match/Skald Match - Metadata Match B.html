<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Skald — Metadata Match (Option B · Side-by-Side)</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+Pro:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root { --onyx-accent: #d4a64a; --onyx-accent-r: 212; --onyx-accent-g: 166; --onyx-accent-b: 74; }
  html, body, #root { margin: 0; padding: 0; height: 100%; width: 100%; background: #08080b; color: #ebe7df; }
  body { font-family: 'Inter', -apple-system, system-ui, sans-serif; display: flex; align-items: center; justify-content: center; }
  * { box-sizing: border-box; }
  button { font-family: inherit; color: inherit; }
  button:focus-visible { outline: 2px solid var(--onyx-accent); outline-offset: 2px; }
  ::selection { background: rgba(var(--onyx-accent-r), var(--onyx-accent-g), var(--onyx-accent-b), 0.35); }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(var(--onyx-accent-r), var(--onyx-accent-g), var(--onyx-accent-b), 0.3); }
  ::-webkit-scrollbar-track { background: transparent; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="match-wash.jsx"></script>
<script type="text/babel" src="option-b.jsx"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  // The Metadata Match review opens as a small modal window inside the Skald
  // app. This frame reproduces that 720×600 window so Option B reads in context.
  function WindowFrame({ children }) {
    return (
      <div style={{ width: 720, height: 600, borderRadius: 14, overflow: 'hidden',
        border: '1px solid rgba(255,255,255,0.10)',
        boxShadow: '0 40px 90px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.06)' }}>
        {children}
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(
    <WindowFrame><OptionB /></WindowFrame>
  );
</script>
</body>
</html>
