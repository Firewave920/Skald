<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Skald — Saga Login (standalone preview)</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+Pro:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #050507; }
  body { font-family: 'Inter', system-ui, sans-serif; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  * { box-sizing: border-box; }
  .shell { width: 760px; height: 620px; position: relative; border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 30px 70px rgba(0,0,0,0.5); }

  .mtb-btn:hover { background: rgba(255,255,255,0.10); color: #ebe7df; }
  .mtb-close:hover { background: rgba(231,72,86,0.85) !important; color: #fff !important; }
  input:focus, select:focus, textarea:focus { outline: none; }
  input::placeholder { color: rgba(235,231,223,0.30); }
  ::selection { background: rgba(212,166,74,0.35); }

  .saga-cta { transition: transform 0.12s, box-shadow 0.18s, filter 0.18s; }
  .saga-cta:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 14px 36px rgba(212,166,74,0.32), inset 0 1px 0 rgba(255,255,255,0.2) !important; filter: brightness(1.04); }
  .saga-cta:hover .saga-arrow { transform: translateX(4px); }
  .saga-cta:active:not(:disabled) { transform: translateY(0); }
  .saga-scheme:hover { color: #e9bb5e !important; }
  @keyframes saga-in { from { opacity: 0; transform: translateX(12px); } to { opacity: 1; transform: none; } }
  .saga-card-in { animation: saga-in 480ms cubic-bezier(.2,.7,.2,1) both; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="source/login/tokens.jsx"></script>
<script type="text/babel" src="source/login/saga.jsx"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  ReactDOM.createRoot(document.getElementById('root')).render(
    <div className="shell"><SagaLogin /></div>
  );
</script>
</body>
</html>
