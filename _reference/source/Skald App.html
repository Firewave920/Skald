<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Skald — Onyx</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+Pro:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  /* Accent color — mirrored in JS via setAccentColor so static CSS rules track the swatch. */
  :root {
    --onyx-accent: #d4a64a;
    --onyx-accent-r: 212;
    --onyx-accent-g: 166;
    --onyx-accent-b: 74;
  }

  html, body, #root { margin: 0; padding: 0; height: 100%; width: 100%; background: #0b0b0e; color: #ebe7df; }
  body { font-family: 'Inter', -apple-system, system-ui, sans-serif; overflow: hidden; }
  * { box-sizing: border-box; }
  button { font-family: inherit; color: inherit; }
  button:focus-visible { outline: 2px solid var(--onyx-accent); outline-offset: 2px; }
  input:focus-visible { outline: none; border-color: rgba(var(--onyx-accent-r), var(--onyx-accent-g), var(--onyx-accent-b), 0.5) !important; }
  ::selection { background: rgba(var(--onyx-accent-r), var(--onyx-accent-g), var(--onyx-accent-b), 0.35); }

  /* scrollbar — thin, on-glass */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(var(--onyx-accent-r), var(--onyx-accent-g), var(--onyx-accent-b), 0.3); }
  ::-webkit-scrollbar-track { background: transparent; }

  /* hover states */
  .onyx-tile:hover > div:first-child { transform: translateY(-3px); filter: drop-shadow(0 12px 24px rgba(var(--onyx-accent-r), var(--onyx-accent-g), var(--onyx-accent-b), 0.18)); }
  .onyx-winbtn:hover { background: rgba(255,255,255,0.1) !important; color: #ebe7df !important; }
  .onyx-row:hover { background: rgba(var(--onyx-accent-r), var(--onyx-accent-g), var(--onyx-accent-b), 0.06) !important; }

  /* Poster-tile hover — lifts and accents the border. */
  button[class]:not(.onyx-winbtn):hover { }
  .onyx-poster:hover { transform: translateY(-3px); border-color: rgba(var(--onyx-accent-r), var(--onyx-accent-g), var(--onyx-accent-b), 0.4) !important; box-shadow: 0 18px 40px rgba(0,0,0,0.5), 0 0 24px rgba(var(--onyx-accent-r), var(--onyx-accent-g), var(--onyx-accent-b), 0.15) !important; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<div id="root"></div>
<template id="__bundler_thumbnail">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
    <defs>
      <radialGradient id="g" cx="50%" cy="40%" r="60%">
        <stop offset="0%" stop-color="#3a2a14" />
        <stop offset="100%" stop-color="#0b0b0e" />
      </radialGradient>
    </defs>
    <rect width="200" height="200" fill="url(#g)" />
    <g transform="translate(100 100)">
      <rect x="-32" y="-44" width="64" height="88" rx="6" fill="#1a1a22" stroke="rgba(212,166,74,0.4)" stroke-width="1.5" />
      <rect x="-22" y="-32" width="44" height="2" fill="#d4a64a" opacity="0.7" />
      <text x="0" y="-10" font-family="Georgia, serif" font-size="14" font-weight="600" fill="#d4a64a" text-anchor="middle">S</text>
      <text x="0" y="22" font-family="ui-monospace, monospace" font-size="7" letter-spacing="2" fill="rgba(235,231,223,0.55)" text-anchor="middle">SKALD</text>
    </g>
